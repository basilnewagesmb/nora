<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- EDIT: friend's name in the title -->
    <title>Farewell, Nora! 💛</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --amber:    #F59E0B;
            --charcoal: #1C1917;
            --cream:    #FFFBEB;
            --radius:   12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--charcoal);
        }

        /* ── Gallery grid ── */
        .gallery {
            padding: 24px;
            columns: 4 220px;
            column-gap: 14px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 14px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(28,25,23,.10);
            outline-offset: 3px;
            position: relative;
        }

        .gallery-item:focus-visible { outline: 3px solid var(--amber); }

        /* Both img and video thumbnails scale the same way */
        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s cubic-bezier(.25,.46,.45,.94);
        }

        @media (hover: hover) {
            .gallery-item:hover img,
            .gallery-item:hover video { transform: scale(1.05); }
        }

        /* ── Play badge (video items only) ── */
        .play-badge {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .play-badge-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 4px 20px rgba(0,0,0,.25);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .play-badge-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--charcoal);
            margin-left: 3px; /* optical centering of triangle */
        }

        .gallery-item:hover .play-badge-icon {
            transform: scale(1.12);
            background: rgba(255, 255, 255, 1);
        }

        /* Video type label pill */
        .video-pill {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(28,25,23,.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(28,25,23,.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: opacity .25s ease, visibility .25s ease;
        }

        .lightbox.active { opacity: 1; visibility: visible; }

        .lightbox-inner {
            position: relative;
            max-width: 940px;
            width: 100%;
        }

        /* Image in lightbox */
        .lightbox-img {
            width: 100%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: var(--radius);
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }

        /* Video in lightbox */
        .lightbox-video {
            width: 100%;
            max-height: 88vh;
            border-radius: var(--radius);
            display: block;
            background: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            outline: none;
        }

        /* Toggle visibility in lightbox */
        .lightbox-img.hidden,
        .lightbox-video.hidden { display: none; }

        .lb-btn {
            position: absolute;
            background: rgba(255,255,255,.14);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: background .2s;
            backdrop-filter: blur(4px);
        }

        .lb-btn:hover { background: rgba(255,255,255,.28); }

        .lb-close { top: -52px; right: 0; font-size: 1.5rem; }
        .lb-prev  { top: 50%; left: -58px;  transform: translateY(-50%); }
        .lb-next  { top: 50%; right: -58px; transform: translateY(-50%); }

        /* Push nav buttons inward on mobile so they don't clip */
        @media (max-width: 680px) {
            .lb-prev { left: 4px;  }
            .lb-next { right: 4px; }
            .gallery { padding: 12px; column-gap: 10px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .gallery-item img,
            .gallery-item video   { transition: none; }
            .play-badge-icon      { transition: none; }
            .lightbox             { transition: none; }
        }
    </style>
</head>

<!-- ================================================================
     LIGHTBOX — handles both images and videos
================================================================ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Media viewer">
    <div class="lightbox-inner">
        <button class="lb-btn lb-close" id="lb-close" aria-label="Close">&times;</button>
        <button class="lb-btn lb-prev"  id="lb-prev"  aria-label="Previous">&#8592;</button>

        <!-- Image view -->
        <img class="lightbox-img hidden" id="lb-img" src="" alt="">

        <!-- Video view -->
        <video class="lightbox-video hidden" id="lb-video" controls playsinline>
            <source id="lb-video-src" src="" type="video/mp4">
        </video>

        <button class="lb-btn lb-next" id="lb-next" aria-label="Next">&#8594;</button>
    </div>
</div>


<script>
(function () {
    'use strict';

    /* Build media index from DOM */
    const items = Array.from(document.querySelectorAll('.gallery-item'));
    const media = items.map(el => ({
        type: el.dataset.type,           // "image" | "video"
        src:  el.dataset.src,
        alt:  (el.querySelector('img, video') || {}).alt || '',
    }));

    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lb-img');
    const lbVideo    = document.getElementById('lb-video');
    const lbVideoSrc = document.getElementById('lb-video-src');
    const lbClose    = document.getElementById('lb-close');
    const lbPrev     = document.getElementById('lb-prev');
    const lbNext     = document.getElementById('lb-next');

    let cur = 0;

    function stopVideo() {
        lbVideo.pause();
        lbVideoSrc.src = '';
        lbVideo.load();
    }

    function show(i) {
        cur = (i + media.length) % media.length;
        const m = media[cur];

        if (m.type === 'video') {
            lbImg.classList.add('hidden');
            lbVideo.classList.remove('hidden');
            lbVideoSrc.src = m.src;
            lbVideo.load();
        } else {
            stopVideo();
            lbVideo.classList.add('hidden');
            lbImg.classList.remove('hidden');
            lbImg.src = m.src;
            lbImg.alt = m.alt;
        }
    }

    function open(i) {
        show(i);
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
        lbClose.focus();
    }

    function close() {
        stopVideo();
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
    }

    items.forEach((el, i) => {
        el.addEventListener('click',   () => open(i));
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(i); }
        });
    });

    lbClose.addEventListener('click', close);
    lbPrev.addEventListener( 'click', () => show(cur - 1));
    lbNext.addEventListener( 'click', () => show(cur + 1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  show(cur - 1);
        if (e.key === 'ArrowRight') show(cur + 1);
    });
}());
</script>
