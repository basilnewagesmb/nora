<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- EDIT: friend's name in the title -->
    <title>Farewell, Nora! 💛</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --amber:    #F59E0B;
            --charcoal: #1C1917;
            --cream:    #FFFBEB;
            --radius:   12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--cream);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--charcoal);
        }

        /* ── Gallery grid ── */
        .gallery {
            padding: 24px;
            columns: 4 220px;
            column-gap: 14px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 14px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(28,25,23,.10);
            outline-offset: 3px;
        }

        .gallery-item:focus-visible { outline: 3px solid var(--amber); }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s cubic-bezier(.25,.46,.45,.94);
        }

        @media (hover: hover) {
            .gallery-item:hover img { transform: scale(1.05); }
        }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(28,25,23,.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: opacity .25s ease, visibility .25s ease;
        }

        .lightbox.active { opacity: 1; visibility: visible; }

        .lightbox-inner {
            position: relative;
            max-width: 940px;
            width: 100%;
        }

        .lightbox-img {
            width: 100%;
            max-height: 88vh;
            object-fit: contain;
            border-radius: var(--radius);
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }

        .lb-btn {
            position: absolute;
            background: rgba(255,255,255,.14);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: background .2s;
            backdrop-filter: blur(4px);
        }

        .lb-btn:hover { background: rgba(255,255,255,.28); }

        .lb-close { top: -52px; right: 0; font-size: 1.5rem; }
        .lb-prev  { top: 50%; left: -58px;  transform: translateY(-50%); }
        .lb-next  { top: 50%; right: -58px; transform: translateY(-50%); }

        @media (max-width: 680px) {
            .lb-prev { left: 4px;  }
            .lb-next { right: 4px; }
            .gallery { padding: 12px; column-gap: 10px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .gallery-item img { transition: none; }
            .lightbox { transition: none; }
        }
    </style>
</head>

<body>

<!-- ================================================================
     PHOTO GALLERY
     EDIT: replace each src with your photo URL
================================================================ -->
<div class="gallery" id="gallery">

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 1">
        <img src="https://picsum.photos/seed/farewell1/600/420"  alt="Memory 1"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 2">
        <img src="https://picsum.photos/seed/farewell2/600/760"  alt="Memory 2"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 3">
        <img src="https://picsum.photos/seed/farewell3/600/460"  alt="Memory 3"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 4">
        <img src="https://picsum.photos/seed/farewell4/600/600"  alt="Memory 4"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 5">
        <img src="https://picsum.photos/seed/farewell5/600/410"  alt="Memory 5"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 6">
        <img src="https://picsum.photos/seed/farewell6/600/800"  alt="Memory 6"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 7">
        <img src="https://picsum.photos/seed/farewell7/600/500"  alt="Memory 7"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 8">
        <img src="https://picsum.photos/seed/farewell8/600/430"  alt="Memory 8"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 9">
        <img src="https://picsum.photos/seed/farewell9/600/700"  alt="Memory 9"  loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 10">
        <img src="https://picsum.photos/seed/farewell10/600/450" alt="Memory 10" loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 11">
        <img src="https://picsum.photos/seed/farewell11/600/540" alt="Memory 11" loading="lazy">
    </div>

    <div class="gallery-item" tabindex="0" role="button" aria-label="Open photo 12">
        <img src="https://picsum.photos/seed/farewell12/600/400" alt="Memory 12" loading="lazy">
    </div>

</div>


<!-- ================================================================
     LIGHTBOX
================================================================ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="lightbox-inner">
        <button class="lb-btn lb-close" id="lb-close" aria-label="Close">&times;</button>
        <button class="lb-btn lb-prev"  id="lb-prev"  aria-label="Previous">&#8592;</button>
        <img class="lightbox-img" id="lb-img" src="" alt="">
        <button class="lb-btn lb-next"  id="lb-next"  aria-label="Next">&#8594;</button>
    </div>
</div>


<script>
(function () {
    'use strict';

    const items    = Array.from(document.querySelectorAll('.gallery-item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbClose  = document.getElementById('lb-close');
    const lbPrev   = document.getElementById('lb-prev');
    const lbNext   = document.getElementById('lb-next');

    const srcs = items.map(el => ({ src: el.querySelector('img').src, alt: el.querySelector('img').alt }));
    let cur = 0;

    function show(i) {
        cur = (i + srcs.length) % srcs.length;
        lbImg.src = srcs[cur].src;
        lbImg.alt = srcs[cur].alt;
    }

    function open(i)  { show(i); lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; lbClose.focus(); }
    function close()  { lightbox.classList.remove('active'); document.body.style.overflow = ''; }

    items.forEach((el, i) => {
        el.addEventListener('click',   () => open(i));
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(i); } });
    });

    lbClose.addEventListener('click', close);
    lbPrev.addEventListener( 'click', () => show(cur - 1));
    lbNext.addEventListener( 'click', () => show(cur + 1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  show(cur - 1);
        if (e.key === 'ArrowRight') show(cur + 1);
    });
}());
</script>

</body>
</html>
